# Phase 0 language/corpus inventory for BOON_DD_HONEST_COMPILER_PLAN.md.
#
# This is not a completion claim. It is the checked-in source of truth that
# future phases must expand until every accepted syntax and semantic feature has
# parser, resolver, shape, semantic IR, DD lowering, generated runtime, host
# parity, positive fixture, and negative diagnostic coverage.

[language]
name = "Boon"
accepted_language_version = "phase0-inventory"
status = "incomplete"
plan = "BOON_DD_HONEST_COMPILER_PLAN.md"

# Cross-repo inventory is deliberately non-acceptance evidence. These examples
# and library families are present in local sibling Boon repositories and must
# either be imported into the accepted corpus with full coverage or rejected by a
# checked-in product decision. They are listed here so the manifest is an honest
# source of truth instead of silently omitting known Boon surface.
[cross_repo_inventory]
status = "not-accepted"
source_repos = [
    "/home/martinkavik/repos/boon-gleam/examples/upstream",
    "/home/martinkavik/repos/boon-pony/examples/upstream",
    "/home/martinkavik/repos/boon-rust/examples",
]
example_ids = [
    "arkanoid",
    "button_hover_test",
    "button_hover_to_click_test",
    "cells_dynamic",
    "chained_list_remove_bug",
    "checkbox_test",

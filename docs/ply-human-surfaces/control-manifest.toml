version = 1
targets = ["terminal", "native", "browser"]

[examples.counter]
required_targets = ["terminal", "native", "browser"]
notes = "Counter proves the accepted Boon source action. Decrement is not listed because the accepted counter source has no decrement source binding."
actions = [
  { kind = "select_example", value = "counter" },
  { kind = "screenshot", name = "selected" },
  { kind = "activate", semantic = "increment" },
  { kind = "screenshot", name = "after-action" },
  { kind = "assert_state_changed", field = "render_text" },
]

